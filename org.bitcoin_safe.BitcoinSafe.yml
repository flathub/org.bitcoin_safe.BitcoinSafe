app-id: org.bitcoin_safe.BitcoinSafe
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: run-bitcoin-safe.sh
separate-locales: false
finish-args:
- --share=network
- --share=ipc
- --socket=wayland
- --device=all
- --socket=fallback-x11
modules:
- name: libusb
  buildsystem: autotools
  config-opts:
  - --disable-static
  cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/libusb/libusb.git
    tag: v1.0.26
    commit: 4239bc3a50014b8e6a5a2a59df1fff3b7469543b
- name: hidapi
  buildsystem: cmake-ninja
  config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DHIDAPI_WITH_HIDRAW=ON
  - -DHIDAPI_WITH_LIBUSB=ON
  - -DHIDAPI_BUILD_HIDTEST=OFF
  - -DHIDAPI_BUILD_TESTGUI=OFF
  cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/libusb/hidapi.git
    tag: hidapi-0.15.0
    commit: d6b2a974608dec3b76fb1e36c189f22b9cf3650c
- name: zbar
  buildsystem: simple
  build-commands:
  - autoreconf -vfi
  - ./configure --prefix=/app --enable-pthread=no --enable-doc=no --with-python=no --with-gtk=no --with-qt=no --with-java=no --with-imagemagick=no --with-dbus=no --with-x=no --enable-video=no --with-jpeg=no --enable-codes=qrcode --disable-static --enable-shared
  - make -j${FLATPAK_BUILDER_N_JOBS}
  - make install
  cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/mchehab/zbar.git
    tag: 0.23.93
    commit: bb05ec54eec57f8397cb13fb9161372a281a1219
- python3-build-backends.json
- python3-runtime.json
- python3-git-packages.json
- name: bitcoin-safe
  buildsystem: simple
  build-commands:
  - pip3 install --ignore-installed --no-build-isolation --prefix=${FLATPAK_DEST} --no-deps .
  - install -Dm755 run-bitcoin-safe.sh /app/bin/run-bitcoin-safe.sh
  - install -Dm644 org.bitcoin_safe.BitcoinSafe.svg /app/share/icons/hicolor/scalable/apps/org.bitcoin_safe.BitcoinSafe.svg
  - install -Dm644 org.bitcoin_safe.BitcoinSafe.png /app/share/icons/hicolor/128x128/apps/org.bitcoin_safe.BitcoinSafe.png
  - install -Dm644 org.bitcoin_safe.BitcoinSafe.metainfo.xml /app/share/metainfo/org.bitcoin_safe.BitcoinSafe.metainfo.xml
  - install -Dm644 org.bitcoin_safe.BitcoinSafe.desktop /app/share/applications/org.bitcoin_safe.BitcoinSafe.desktop
  sources:
  - type: archive
    url: https://github.com/andreasgriffin/bitcoin-safe/archive/refs/tags/2.0.0.tar.gz
    sha256: 3ab8ba7d1a0999b9a687ed9f094d54e9a86f19398b88da5869537cf31d41d599
  - type: file
    path: run-bitcoin-safe.sh
  - type: file
    path: org.bitcoin_safe.BitcoinSafe.svg
  - type: file
    path: org.bitcoin_safe.BitcoinSafe.png
  - type: file
    path: org.bitcoin_safe.BitcoinSafe.desktop
  - type: file
    path: org.bitcoin_safe.BitcoinSafe.metainfo.xml

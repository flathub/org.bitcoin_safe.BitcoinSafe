app-id: org.bitcoin_safe.BitcoinSafe
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: run-bitcoin-safe.sh
separate-locales: false
build-options:
  env:
  - BASEAPP_REMOVE_WEBENGINE=1
cleanup-commands:
- /app/cleanup-BaseApp.sh
finish-args:
- --require-version=1.16.0
- --share=network
- --share=ipc
- --socket=wayland
- --socket=fallback-x11
- --device=usb
modules:
- name: hidapi
  buildsystem: cmake-ninja
  config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DHIDAPI_WITH_HIDRAW=ON
  - -DHIDAPI_WITH_LIBUSB=ON
  - -DHIDAPI_BUILD_HIDTEST=OFF
  - -DHIDAPI_BUILD_TESTGUI=OFF
  cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/libusb/hidapi.git
    tag: hidapi-0.15.0
    commit: d6b2a974608dec3b76fb1e36c189f22b9cf3650c
- name: zbar
  buildsystem: autotools
  config-opts:
  - --enable-pthread=no
  - --enable-doc=no
  - --with-python=no
  - --with-gtk=no
  - --with-qt=no
  - --with-java=no
  - --with-imagemagick=no
  - --with-dbus=no
  - --with-x=no
  - --enable-video=no
  - --with-jpeg=no
  - --enable-codes=qrcode
  - --disable-static
  - --enable-shared
  cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/mchehab/zbar.git
    tag: 0.23.93
    commit: bb05ec54eec57f8397cb13fb9161372a281a1219
  - type: script
    dest-filename: autogen.sh
    commands:
    - exec autoreconf -vfi
- python3-build-backends.json
- python3-runtime.json
- python3-git-packages.json
- name: bitcoin-safe
  buildsystem: simple
  build-commands:
  - bash build-flatpak-app.sh
  sources:
  - type: archive
    url: https://github.com/andreasgriffin/bitcoin-safe/archive/2219ac941392ceaf8ed68444fa26d2df5ddf0995.tar.gz
    sha256: 532fcb73af97f3798decabad63deb4639ad6228f58c7f17691c8fdb7a4eb50c7
  - type: file
    path: build-flatpak-app.sh
  - type: file
    path: run-bitcoin-safe.sh

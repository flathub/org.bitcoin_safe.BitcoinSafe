app-id: org.bitcoin_safe.BitcoinSafe
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: run-bitcoin-safe.sh
separate-locales: false
finish-args:
- --share=network
- --share=ipc
- --socket=wayland
- --device=all
- --socket=fallback-x11
modules:
- name: libusb
  buildsystem: autotools
  config-opts:
  - --disable-static
  cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/libusb/libusb.git
    tag: v1.0.26
    commit: 4239bc3a50014b8e6a5a2a59df1fff3b7469543b
- name: hidapi
  buildsystem: cmake-ninja
  config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DHIDAPI_WITH_HIDRAW=ON
  - -DHIDAPI_WITH_LIBUSB=ON
  - -DHIDAPI_BUILD_HIDTEST=OFF
  - -DHIDAPI_BUILD_TESTGUI=OFF
  cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/libusb/hidapi.git
    tag: hidapi-0.15.0
    commit: d6b2a974608dec3b76fb1e36c189f22b9cf3650c
- name: zbar
  buildsystem: autotools
  config-opts:
  - --enable-pthread=no
  - --enable-doc=no
  - --with-python=no
  - --with-gtk=no
  - --with-qt=no
  - --with-java=no
  - --with-imagemagick=no
  - --with-dbus=no
  - --with-x=no
  - --enable-video=no
  - --with-jpeg=no
  - --enable-codes=qrcode
  - --disable-static
  - --enable-shared
  cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  sources:
  - type: git
    url: https://github.com/mchehab/zbar.git
    tag: 0.23.93
    commit: bb05ec54eec57f8397cb13fb9161372a281a1219
  - type: script
    dest-filename: autogen.sh
    commands:
    - exec autoreconf -vfi
- python3-build-backends.json
- python3-runtime.json
- python3-git-packages.json
- name: bitcoin-safe
  buildsystem: simple
  build-commands:
  - bash build-flatpak-app.sh
  sources:
  - type: archive
    url: https://github.com/andreasgriffin/bitcoin-safe/archive/3f9b3796e595fb9f2d661a684b00772cc8f89b2e.tar.gz
    sha256: 5d250d2de3410486d4a72f63154fe1c08dde96d9013efbf4586e396f1284bff4
  - type: file
    path: build-flatpak-app.sh
  - type: file
    path: run-bitcoin-safe.sh

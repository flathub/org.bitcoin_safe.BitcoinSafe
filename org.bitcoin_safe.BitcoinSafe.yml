app-id: org.bitcoin_safe.BitcoinSafe
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: run-bitcoin-safe.sh
separate-locales: false
build-options:
  env:
  - BASEAPP_REMOVE_WEBENGINE=1
cleanup:
- /share/bitcoin-safe/vendor
- /include
- /lib/pkgconfig
- /share/doc
- /share/man
cleanup-commands:
- /app/cleanup-BaseApp.sh
- rm -rf /app/lib/python3.13/site-packages/Cryptodome/SelfTest
- rm -rf /app/lib/python3.13/site-packages/psutil/tests /app/lib/python3.13/site-packages/qrcode/tests /app/lib/python3.13/site-packages/websocket/tests
- find /app -name '.git' -type d -print0 | xargs -0 --no-run-if-empty rm -rf
- find /app -type f \( -name '.gitmodules' -o -name '.gitignore' -o -name '.gitattributes' -o -name '.gitkeep' \) -delete
- find /app -path '*/__pycache__*' -delete
finish-args:
- --share=network
- --share=ipc
- --socket=wayland
- --socket=fallback-x11
- --device=all
modules:
- name: hidapi
  buildsystem: cmake-ninja
  config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DHIDAPI_WITH_HIDRAW=ON
  - -DHIDAPI_WITH_LIBUSB=ON
  - -DHIDAPI_BUILD_HIDTEST=OFF
  - -DHIDAPI_BUILD_TESTGUI=OFF
  sources:
  - type: git
    url: https://github.com/libusb/hidapi.git
    tag: hidapi-0.15.0
    commit: d6b2a974608dec3b76fb1e36c189f22b9cf3650c
- name: zbar
  buildsystem: autotools
  config-opts:
  - --enable-pthread=no
  - --enable-doc=no
  - --with-python=no
  - --with-gtk=no
  - --with-qt=no
  - --with-java=no
  - --with-imagemagick=no
  - --with-dbus=no
  - --with-x=no
  - --enable-video=no
  - --with-jpeg=no
  - --enable-codes=qrcode
  - --disable-static
  - --enable-shared
  cleanup:
  - /bin
  sources:
  - type: git
    url: https://github.com/mchehab/zbar.git
    tag: 0.23.93
    commit: bb05ec54eec57f8397cb13fb9161372a281a1219
  - type: script
    dest-filename: autogen.sh
    commands:
    - exec autoreconf -vfi
- python3-build-backends.json
- python3-runtime.json
- python3-git-packages.json
- name: bitcoin-safe
  buildsystem: simple
  build-commands:
  - bash tools/build-linux/flathub-flatpak/build-flatpak-app.sh
  sources:
  - type: archive
    url: https://github.com/andreasgriffin/bitcoin-safe/archive/be8355df856308df84fa942e0794605fffc7e16d.tar.gz
    sha256: 6772d0d5a35bda08b72f1b5e0f50454cd63bd048d138817f9d14196490f967e6
